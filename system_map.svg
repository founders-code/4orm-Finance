<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d" font-family="Inter, system-ui, sans-serif">
  <title id="t">4orm Living System Map, static reference</title>
  <desc id="d">A three-layer map. Layer 1 (Domestic Payments) shows on-us, interbank via 4orm forward and reverse, legacy correspondent, and international bridge pipelines. Layer 2 (Atomic Settlement) shows token mint, DvP match engine with treasury, custody, and canonical-ledger finality. Layer 3 (Network Services) shows KYC reuse hub, supervisory node (read-only, aggregate), attestation registry, and the canonical token registry as the Canadian-anchored ledger of record.</desc>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#4A5468"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#B8612B"/></marker>
    <marker id="ad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#2D4A6B"/></marker>
  </defs>

  <rect x="0" y="0" width="1200" height="270" fill="#FAF8F4"/>
  <rect x="0" y="270" width="1200" height="190" fill="#F3EFE7"/>
  <rect x="0" y="460" width="1200" height="160" fill="#EDE8DC"/>

  <text x="20" y="22" font-size="11" font-weight="600" fill="#4A5468" letter-spacing="0.8">LAYER 1   DOMESTIC PAYMENTS</text>
  <text x="20" y="292" font-size="11" font-weight="600" fill="#4A5468" letter-spacing="0.8">LAYER 2   ATOMIC SETTLEMENT</text>
  <text x="20" y="482" font-size="11" font-weight="600" fill="#4A5468" letter-spacing="0.8">LAYER 3   NETWORK SERVICES</text>

