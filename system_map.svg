  <text x="1085" y="133" font-size="9" font-weight="500" fill="#B8612B" text-anchor="middle">Layer-Zero bridge, roadmap</text>
  <text x="1085" y="160" font-size="9" font-weight="400" fill="#8A8579" text-anchor="middle" font-style="italic">Activates when destination chain opens its interface.</text>

