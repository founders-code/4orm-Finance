  <text x="1030" y="338" font-size="12" font-weight="600" fill="#1A2332" text-anchor="middle">Token mint</text>
  <text x="1030" y="354" font-size="10" font-weight="400" fill="#8A8579" text-anchor="middle">asset leg</text>

