  <path d="M 720 130 L 1020 510" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="2 4" opacity="0.45" fill="none"/>
  <path d="M 600 425 L 600 460 L 530 500" stroke="#B8612B" stroke-width="1.6" fill="none" marker-end="url(#ag)" opacity="0.9"/>
  <text x="610" y="445" font-size="9" font-weight="500" fill="#B8612B" font-style="italic">Read-only, aggregate only, no customer detail</text>

  <rect x="80" y="490" width="160" height="46" rx="8" fill="#FFFFFF" stroke="#D9E0EA"/>
  <text x="160" y="510" font-size="12" font-weight="600" fill="#4A5468" text-anchor="middle">KYC reuse hub</text>
  <text x="160" y="525" font-size="9" font-weight="400" fill="#8A8579" text-anchor="middle">partner of record, TBD</text>

  <rect x="460" y="490" width="160" height="46" rx="8" fill="#FFFFFF" stroke="#D9E0EA"/>
  <text x="540" y="510" font-size="12" font-weight="600" fill="#4A5468" text-anchor="middle">Supervisory node</text>
  <text x="540" y="525" font-size="9" font-weight="400" fill="#8A8579" text-anchor="middle">OSFI, FINTRAC, FSRA</text>

  <rect x="700" y="490" width="160" height="46" rx="8" fill="#FFFFFF" stroke="#D9E0EA"/>
  <text x="780" y="510" font-size="12" font-weight="600" fill="#4A5468" text-anchor="middle">Attestation registry</text>
  <text x="780" y="525" font-size="9" font-weight="400" fill="#8A8579" text-anchor="middle">read-only</text>

  <rect x="940" y="490" width="180" height="46" rx="8" fill="#FFFFFF" stroke="#B8612B" stroke-width="1.4"/>
