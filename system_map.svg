  <text x="530" y="278" font-size="9" font-weight="600" fill="#4A5468" text-anchor="middle">Treasury</text>

  <circle cx="670" cy="295" r="14" fill="#FFFFFF" stroke="#2F7A5C" stroke-width="1.4"/>
  <text x="670" y="299" font-size="11" font-weight="700" fill="#2F7A5C" text-anchor="middle">&#10003;</text>
  <text x="670" y="278" font-size="9" font-weight="600" fill="#4A5468" text-anchor="middle">Custody</text>

  <circle cx="600" cy="435" r="14" fill="#FFFFFF" stroke="#2F7A5C" stroke-width="1.4"/>
  <text x="600" y="439" font-size="11" font-weight="700" fill="#2F7A5C" text-anchor="middle">&#10003;</text>
  <text x="600" y="425" font-size="9" font-weight="600" fill="#4A5468" text-anchor="middle">Canonical ledger</text>

  <circle cx="600" cy="365" r="42" fill="#FFFFFF" stroke="#2F7A5C" stroke-width="1.8"/>
  <text x="600" y="362" font-size="12" font-weight="600" fill="#1A2332" text-anchor="middle">DvP match</text>
  <text x="600" y="377" font-size="10" font-weight="500" fill="#2F7A5C" text-anchor="middle">T+0 atomic</text>
  <text x="600" y="492" font-size="9" font-weight="400" fill="#8A8579" text-anchor="middle" font-style="italic">Settlement finality requires all three. Blockchain confirmation alone does not represent institutional finality.</text>

