  <text x="75" y="108" font-size="12" font-weight="600" fill="#1A2332" text-anchor="middle">Customer A</text>
  <text x="75" y="123" font-size="10" font-weight="400" fill="#8A8579" text-anchor="middle">sender</text>

  <rect x="120" y="80" width="80" height="65" rx="8" fill="#FFFFFF" stroke="#2D4A6B" stroke-width="1.4"/>
  <text x="160" y="108" font-size="12" font-weight="600" fill="#1A2332" text-anchor="middle">Bank A</text>
  <text x="160" y="123" font-size="10" font-weight="400" fill="#8A8579" text-anchor="middle">issuer</text>

  <rect x="120" y="160" width="80" height="32" rx="6" fill="#F7F4ED" stroke="#E5E1D9"/>
  <text x="160" y="180" font-size="10" font-weight="600" fill="#4A5468" text-anchor="middle">Internal ledger</text>

